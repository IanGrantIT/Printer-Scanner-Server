<!DOCTYPE html>
<html>
<head>
  <title>Scanner Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: #00ff66;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    .box {
      border: 1px solid #00ff66;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 12px;
      font-size: 14px;
    }

    select, button, a {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: black;
      color: #00ff66;
      border: 1px solid #00ff66;
      border-radius: 6px;
      box-sizing: border-box;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: #00ff66;
      color: black;
      font-weight: bold;
    }

    .secondary {
      background: black;
      color: #00ff66;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }

    #preview {
      margin-top: 20px;
      display: none;
    }

    #thumb {
      max-width: 100%;
      max-height: 300px;
      border: 1px solid #00ff66;
      border-radius: 8px;
      margin-top: 10px;
    }

    #downloadBtn {
      display: none;
      margin-top: 12px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Scanner Portal</h2>

  <label for="format">Scan Format</label>
  <select id="format">
    <option value="png">PNG</option>
    <option value="jpg">JPG</option>
    <option value="tif">TIF</option>
  </select>

  <label for="mode">Color Mode</label>
  <select id="mode">
    <option value="Color">Color</option>
    <option value="Gray">Grayscale</option>
    <option value="Lineart">Black & White</option>
  </select>

  <label for="resolution">Resolution</label>
  <select id="resolution">
    <option value="150">150 DPI</option>
    <option value="300" selected>300 DPI</option>
    <option value="600">600 DPI</option>
  </select>

  <button onclick="startScan()">Scan</button>
  <a class="secondary" href="/print/">Back to Print Portal</a>

  <div id="status">Ready</div>

  <div id="preview">
    <h3>Scan Preview</h3>
    <img id="thumb" alt="Scanned thumbnail">
    <a id="downloadBtn" download>Download Scan</a>
  </div>
</div>

<script>
async function startScan() {
  const status = document.getElementById("status");
  const preview = document.getElementById("preview");
  const thumb = document.getElementById("thumb");
  const downloadBtn = document.getElementById("downloadBtn");

  const format = document.getElementById("format").value;
  const mode = document.getElementById("mode").value;
  const resolution = document.getElementById("resolution").value;

  status.innerText = "Scanning...";
  preview.style.display = "none";
  thumb.style.display = "block";
  downloadBtn.style.display = "none";
  thumb.removeAttribute("src");

  try {
    const res = await fetch("http://192.168.1.64:5001/api/scan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        format,
        mode,
        resolution
      })
    });

    const data = await res.json();

    if (!data.ok) {
      status.innerText = "Error: " + data.error;
      return;
    }

    status.innerText = "Scan complete";

    preview.style.display = "block";

    if (data.thumbnailUrl) {
      thumb.style.display = "block";
      thumb.src = data.thumbnailUrl + "?t=" + Date.now();
    } else {
      thumb.style.display = "none";
    }

    downloadBtn.href = data.downloadUrl + "?t=" + Date.now();
    downloadBtn.style.display = "block";

  } catch (err) {
    status.innerText = "Network error";
  }
}
</script>

</body>
</html>
